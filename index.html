<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STV V8.0.0</title>

<style>
body { margin:0; font-family:sans-serif; background:#0b1220; color:white; }
.header { text-align:center; padding:15px; font-size:20px; font-weight:bold; background:#111a2e; }
.player-container { padding:10px; }
video { width:100%; border-radius:12px; background:black; }

.grid2 { display:grid; grid-template-columns: 1fr 1fr; gap:10px; padding:10px; }
input { width:100%; padding:10px; border-radius:10px; border:none; }

.dropdown { background:#1c2742; border-radius:10px; cursor:pointer; padding:10px; }
.dropdown-title { font-weight:bold; }

.dropdown-box { background:#111a2e; border-radius:12px; margin:10px; overflow:hidden; }
.dropdown-content { max-height:0; overflow:hidden; transition:0.3s; }
.dropdown-box.active .dropdown-content { max-height:200px; overflow:auto; }

.item { display:flex; align-items:center; gap:10px; padding:12px; border-bottom:1px solid #222; cursor:pointer; }
.item:hover { background:#1c2742; }
.item img { width:30px; height:30px; object-fit:contain; border-radius:6px; background:#000; }

#streams { padding:10px; }
button { padding:8px 12px; margin:5px; border:none; border-radius:8px; background:#1c2742; color:white; }
</style>
</head>

<body>

<div class="header">STV1</div>

<div class="player-container">
  <video id="player" controls></video>
</div>

<div id="streams"></div>

<div class="grid2">

  <div class="dropdown" onclick="toggleDropdown('countryBox')">
    <div class="dropdown-title" id="countryTitle">کشورها ▼</div>
  </div>

  <input id="countrySearch" placeholder="جستجوی کشور...">

  <div class="dropdown" onclick="toggleDropdown('channelBox')">
    <div class="dropdown-title" id="channelTitle">کانال‌ها ▼</div>
  </div>

  <input id="channelSearch" placeholder="جستجوی کانال...">

</div>

<div class="dropdown-box" id="countryBox">
  <div class="dropdown-content">
    <div id="countries"></div>
  </div>
</div>

<div class="dropdown-box" id="channelBox">
  <div class="dropdown-content">
    <div id="channels"></div>
  </div>
</div>

<script>
const base = "https://iptv-org.github.io/api";
let channels = [];
let currentStreams = [];

let selectedCountryName = "کشورها ▼";
let selectedChannelName = "کانال‌ها ▼";

function updateTitles() {
  document.getElementById("countryTitle").innerText = selectedCountryName;
  document.getElementById("channelTitle").innerText = selectedChannelName;
}

function toggleDropdown(id) {
  document.getElementById(id).classList.toggle("active");
}

// کشورها
fetch(base + "/countries.json")
  .then(r => r.json())
  .then(data => renderCountries(data));

function renderCountries(list) {
  const box = document.getElementById("countries");
  box.innerHTML = "";

  list.forEach(c => {
    const div = document.createElement("div");
    div.className = "item";

    const flag = document.createElement("img");
    flag.src = `https://flagcdn.com/w40/${c.code.toLowerCase()}.png`;

    const name = document.createElement("span");
    name.innerText = c.name;

    div.appendChild(flag);
    div.appendChild(name);

    div.onclick = () => {
      selectedCountryName = c.name + " ✓";
      updateTitles();
      toggleDropdown('countryBox');
      loadChannels(c.code);
    };

    box.appendChild(div);
  });
}

// سرچ کشور
document.getElementById("countrySearch").oninput = function() {
  fetch(base + "/countries.json")
    .then(r => r.json())
    .then(data => {
      renderCountries(data.filter(c =>
        c.name.toLowerCase().includes(this.value.toLowerCase())
      ));
    });
};

// کانال‌ها
function loadChannels(code) {
  fetch(base + "/channels.json")
    .then(r => r.json())
    .then(data => {
      channels = data.filter(c => c.country === code);
      renderChannels(channels);
    });
}

function renderChannels(list) {
  const box = document.getElementById("channels");
  box.innerHTML = "";

  list.forEach(c => {
    const div = document.createElement("div");
    div.className = "item";

    const logo = document.createElement("img");
    let url = c.logo || "";
    if (url.startsWith("http://")) url = url.replace("http://", "https://");
    logo.src = url;
    logo.onerror = () => logo.style.display = "none";

    const name = document.createElement("span");
    name.innerText = c.name;

    div.appendChild(logo);
    div.appendChild(name);

    div.onclick = () => {
      selectedChannelName = c.name + " ✓";
      updateTitles();
      toggleDropdown('channelBox');
      loadStreams(c.id);
    };

    box.appendChild(div);
  });
}

// سرچ کانال
document.getElementById("channelSearch").oninput = function() {
  renderChannels(channels.filter(c =>
    c.name.toLowerCase().includes(this.value.toLowerCase())
  ));
};

// استریم
function loadStreams(channelId) {
  fetch(base + "/streams.json")
    .then(r => r.json())
    .then(data => {
      currentStreams = data.filter(s => s.channel === channelId);
      renderStreams(currentStreams);
      playStream(0);
    });
}

function renderStreams(list) {
  const box = document.getElementById("streams");
  box.innerHTML = "";

  const count = document.createElement("div");
  count.innerText = "تعداد استریم: " + list.length;
  count.style.padding = "10px";
  box.appendChild(count);

  list.forEach((s, i) => {
    const btn = document.createElement("button");
    btn.innerText = "Stream " + (i+1);
    btn.onclick = () => playStream(i);
    box.appendChild(btn);
  });
}

function playStream(index) {
  if (!currentStreams[index]) return;

  const player = document.getElementById("player");
  player.src = currentStreams[index].url;
  player.play();

  let tried = index;

  player.onerror = () => {
    setTimeout(() => {
      tried++;
      if (tried < currentStreams.length) {
        playStream(tried);
      } else {
        alert("هیچ استریمی کار نکرد");
      }
    }, 3000);
  };
}
</script>

</body>
</html>
